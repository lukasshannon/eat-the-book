<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>eat-the-book — Vintage Notebook Shift</title>
    <link rel="stylesheet" href="./static/css/ui.css" />
  </head>
  <body>
    <main id="app" aria-live="polite">
      <aside class="desk-card desk-intro" aria-hidden="true">
        <p class="intro-index">D1</p>
        <h1>Vintage Notebook</h1>
        <p>Spiral-bound pages, torn edges, ink sketches and washi tape.</p>
      </aside>

      <section class="notebook-shell" aria-label="Game notebook">
        <div class="spiral" aria-hidden="true"></div>

        <header class="top-status panel-paper">
          <div class="status-block role-block">
            <span class="status-value" id="chapterValue">1</span>
            <span class="status-label" id="chapterLabel">Chapter</span>
          </div>
          <div class="status-block"><span class="icon">☕</span><span id="energyValue">120/120</span></div>
          <div class="status-block"><span class="icon">🪙</span><span id="coinValue">1200</span></div>
          <div class="status-block"><span class="icon">💎</span><span id="gemValue">80</span></div>
          <button class="settings-btn" id="themeToggle" type="button" aria-label="Toggle notebook contrast" aria-pressed="false">⚙</button>
        </header>

        <div class="scene-visual panel-paper">
          <div class="scene-glow"></div>
          <div class="npc-portrait" aria-hidden="true"></div>
          <aside class="special-note" id="progress">Today's Special: Begin shift.</aside>
        </div>

        <article id="scenePanel" class="dialogue-card panel-paper" role="tabpanel" aria-labelledby="tab-cafe"></article>

        <nav class="bottom-tabs panel-paper" aria-label="Notebook tabs" id="tabBar" role="tablist">
          <button id="tab-cafe" class="tab-btn active" data-tab="cafe" type="button" role="tab" aria-selected="true" aria-controls="scenePanel"><span>☕</span>Café</button>
          <button id="tab-recipes" class="tab-btn" data-tab="recipes" type="button" role="tab" aria-selected="false" aria-controls="recipePanel"><span>📖</span>Recipes</button>
          <button id="tab-worlds" class="tab-btn" data-tab="worlds" type="button" role="tab" aria-selected="false" aria-controls="worldHud"><span>🌐</span>Worlds</button>
          <button id="tab-journal" class="tab-btn" data-tab="journal" type="button" role="tab" aria-selected="false" aria-controls="journalPanel"><span>🗒️</span>Journal</button>
        </nav>
      </section>

      <aside class="world-hud panel-paper" id="worldHud" role="tabpanel" aria-labelledby="tab-worlds">
        <h3>Exploration HUD (World)</h3>
        <div class="stealth-row">👁️ Stealth <span id="stealthMeter">🖤🖤🖤🖤</span></div>
        <div class="world-scene" id="worldScene"></div>
        <div class="slot-row" id="inventory"></div>
        <p class="objective" id="worldObjective">Stay unseen. Find ingredients. Return to the café.</p>
      </aside>

      <section class="pockets" id="pockets">
        <details class="pocket-card" open id="recipePanel" role="tabpanel" aria-labelledby="tab-recipes">
          <summary>Recipe Book</summary>
          <div id="book"></div>
        </details>
        <details class="pocket-card" id="journalPanel" role="tabpanel" aria-labelledby="tab-journal">
          <summary>Inventory Pouch</summary>
          <div id="stats"></div>
        </details>
      </section>

      <section class="controls panel-paper">
        <div class="control-row">
          <button id="startBtn" type="button">Start New</button>
          <button id="continueBtn" type="button">Continue</button>
          <button id="resetBtn" type="button">Reset Save</button>
        </div>
        <div id="errorBox" class="error" role="alert"></div>
      </section>
    </main>

    <script type="module" src="./static/js/main.js"></script>
  </body>
</html>
