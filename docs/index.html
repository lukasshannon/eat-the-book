<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>eat-the-book — Vertical Slice</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0a11;
        --panel: #171522;
        --panel-2: #1d192b;
        --line: #4b3b67;
        --gold: #f0bf74;
        --text: #f8f2e7;
        --muted: #cab99f;
        --danger: #f08989;
        --ok: #a8e7b0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: radial-gradient(circle at 20% 0%, #261e37 0%, #0b0a11 55%, #050408 100%);
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", Roboto, sans-serif;
      }
      #app {
        min-height: 100svh;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 10px;
        padding: 12px;
      }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; }
      .topbar {
        display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 10px 12px;
      }
      .title { font-size: 1rem; font-weight: 700; color: var(--gold); }
      .mini { color: var(--muted); font-size: 0.85rem; }
      .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
      button {
        border: 1px solid #80634a;
        background: #2a2138;
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.92rem;
      }
      button:active { transform: scale(0.99); }
      .main { display: grid; grid-template-columns: 1fr; gap: 10px; }
      .scene { padding: 12px; background: linear-gradient(180deg, var(--panel-2), #14111f); min-height: 180px; }
      .scene h2 { margin: 0 0 6px; font-size: 1.1rem; color: #f5ddb4; }
      .tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
      .tag { border: 1px solid #65507f; border-radius: 999px; padding: 3px 8px; color: var(--muted); font-size: 0.78rem; }
      .dialogue { margin-top: 8px; line-height: 1.45; font-size: 1.02rem; }
      .speaker { color: var(--gold); font-weight: 700; margin-bottom: 4px; }
      .choices { display: grid; gap: 8px; margin-top: 12px; }
      .choice { width: 100%; text-align: left; background: #2d2540; }
      .hud { padding: 10px 12px; display: grid; gap: 8px; }
      .error {
        margin-top: 8px;
        border: 1px solid #874848;
        background: #381f29;
        color: #ffd7d7;
        border-radius: 10px;
        padding: 8px;
        display: none;
      }
      .footer { padding: 10px 12px; display: grid; gap: 8px; }
      .meter { color: var(--ok); }
      details { background: #12101d; border: 1px solid #3f3158; border-radius: 10px; padding: 8px; }
      summary { cursor: pointer; color: #ead8bc; }
      ul { margin: 8px 0 0 18px; padding: 0; }
      @media (min-width: 720px) {
        .main { grid-template-columns: 2fr 1fr; }
      }
    </style>
  </head>
  <body>
    <main id="app">
      <header class="panel topbar">
        <div>
          <div class="title">eat-the-book — Café Outside Time</div>
          <div id="progress" class="mini">Not started</div>
        </div>
        <div class="btn-row">
          <button id="startBtn">Start New</button>
          <button id="continueBtn">Continue</button>
          <button id="resetBtn">Reset Save</button>
        </div>
      </header>

      <section class="main">
        <article class="panel scene" id="scenePanel"></article>
        <aside class="panel hud">
          <div id="stats"></div>
          <details open>
            <summary>Recipe Book</summary>
            <div id="book"></div>
          </details>
          <details>
            <summary>Inventory</summary>
            <div id="inventory"></div>
          </details>
          <div id="errorBox" class="error" role="alert"></div>
        </aside>
      </section>

      <footer class="panel footer">
        <div class="mini">Tap choices to play. Progress auto-saves after every choice.</div>
      </footer>
    </main>

    <script>
      const STORAGE_KEY = "eat-the-book-vertical-slice-v1";

      const CHARACTERS = {
        keeper: "Keeper",
        you: "You",
        orchard: "Orchard Child",
        raincoat: "Raincoat Child",
        mirror: "Mirror Child",
        villain: "Ashen Guest",
      };

      const GAME_DATA = {
        title: {
          location: "Title Screen",
          speaker: CHARACTERS.keeper,
          text: "Welcome back to the Quiet Café. Tonight you can save one drowning world—or leave it hungry.",
          tags: ["Hub", "Choice", "Auto-save"],
          choices: [
            { label: "Begin shift", next: "cafe_intro" }
          ]
        },
        cafe_intro: {
          location: "Quiet Café",
          speaker: CHARACTERS.you,
          text: "Three children wait beside a scarred page: orchard straw, rain-salt, and mirrored ash.",
          tags: ["Location 1", "Dialogue"],
          onEnter: { addBook: ["Orchard Porridge", "Tide Broth"] },
          choices: [
            {
              label: "Promise protection first",
              next: "cafe_plan",
              effects: { flags: { protective: true }, relation: { raincoat: 1 } }
            },
            {
              label: "Promise balance first",
              next: "cafe_plan",
              effects: { flags: { protective: false }, relation: { mirror: 1 } }
            }
          ]
        },
        cafe_plan: {
          location: "Quiet Café",
          speaker: CHARACTERS.raincoat,
          text: "The drowned village is calling. Brew fast and risky, or slow and careful?",
          tags: ["Location 1", "Branching"],
          choices: [
            {
              label: "Brew fast (higher risk, extra yield)",
              next: "orchard_gate",
              effects: { flags: { riskyPlan: true }, addItems: ["hot kettle coal"] }
            },
            {
              label: "Brew carefully (safer route)",
              next: "orchard_gate",
              effects: { flags: { riskyPlan: false }, addItems: ["stable broth base"] }
            }
          ]
        },
        orchard_gate: {
          location: "Ruined Orchard",
          speaker: CHARACTERS.orchard,
          text: "Lantern scarecrows patrol the hedges. Wear the disguise correctly, or sprint half-finished?",
          tags: ["Location 2", "Stealth"],
          onEnter: { addBook: ["Scarecrow Stitch"] },
          choices: [
            {
              label: "Stitch disguise fully",
              next: "drowned_entry",
              effects: { flags: { disguiseChecked: true }, addItems: ["grave-honey", "blighted apple milk"] }
            },
            {
              label: "Rush half-masked",
              next: "drowned_entry",
              effects: { flags: { disguiseChecked: false, limbInjury: true }, addItems: ["grave-honey"] }
            }
          ]
        },
        drowned_entry: {
          location: "Drowned Village",
          speaker: CHARACTERS.raincoat,
          text: "Water climbs the chapel stairs. One cellar is safe, one is rich with ingredients but watched.",
          tags: ["Location 3", "Gathering"],
          choices: [
            {
              label: "Take safe cellar",
              next: "mirror_chamber",
              effects: { flags: { extraIngredients: false }, addItems: ["shell salt"] }
            },
            {
              label: "Raid rich cellar",
              next: "mirror_chamber",
              effects: { flags: { extraIngredients: true }, addItems: ["shell salt", "drowned roots", "pale seaweed"] }
            }
          ]
        },
        mirror_chamber: {
          location: "Glass Refuge",
          speaker: CHARACTERS.mirror,
          text: "Your reflection splits: reveal the true cost to the child, or hide the injuries and fear?",
          tags: ["Location 4", "Trust"],
          choices: [
            {
              label: "Tell the truth",
              next: "kitchen_return",
              effects: { flags: { sharedTruth: true }, relation: { orchard: 1, mirror: 1 } }
            },
            {
              label: "Hide the burden",
              next: "kitchen_return",
              effects: { flags: { sharedTruth: false }, relation: { raincoat: 1 } }
            }
          ]
        },
        kitchen_return: {
          location: "Kitchen of Fate",
          speaker: CHARACTERS.villain,
          text: "A bitter guest blocks the stove. " +
            "\"Feed the baby and keep the machine, or starve the machine and keep your hands clean?\"",
          tags: ["Final Choice", "Ending Branch"],
          onEnter: { addBook: ["Kitchen Oath"] },
          choices: [
            {
              label: "Feed the baby-sun",
              next: "ending_feed",
              effects: { flags: { choseFeed: true }, addItems: ["new sun ember"] }
            },
            {
              label: "Refuse the ritual",
              next: "ending_refuse",
              effects: { flags: { choseFeed: false } }
            }
          ]
        },
        ending_feed: {
          location: "Quiet Café, Dawn",
          speaker: CHARACTERS.keeper,
          text: "The baby-sun wakes. The village drains, the orchard warms, and the children keep your name in the book margins.",
          tags: ["Ending"],
          end: true
        },
        ending_refuse: {
          location: "Quiet Café, Dusk",
          speaker: CHARACTERS.keeper,
          text: "You deny the ritual. No world heals tonight, but the machine cracks and a new path opens with no recipe commands.",
          tags: ["Ending"],
          end: true
        }
      };

      const ui = {
        scenePanel: document.getElementById("scenePanel"),
        stats: document.getElementById("stats"),
        inventory: document.getElementById("inventory"),
        book: document.getElementById("book"),
        errorBox: document.getElementById("errorBox"),
        progress: document.getElementById("progress"),
        startBtn: document.getElementById("startBtn"),
        continueBtn: document.getElementById("continueBtn"),
        resetBtn: document.getElementById("resetBtn"),
      };

      function defaultState() {
        return {
          current: "title",
          started: false,
          flags: {
            protective: false,
            riskyPlan: false,
            sharedTruth: false,
            disguiseChecked: false,
            extraIngredients: false,
            limbInjury: false,
            choseFeed: false,
          },
          relation: { orchard: 0, raincoat: 0, mirror: 0 },
          inventory: [],
          recipeBook: ["Orchard Porridge"],
          visited: {},
        };
      }

      function save(state) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return defaultState();
          const parsed = JSON.parse(raw);
          return { ...defaultState(), ...parsed, flags: { ...defaultState().flags, ...(parsed.flags || {}) } };
        } catch (err) {
          showError("Save file is corrupted. Starting fresh.");
          return defaultState();
        }
      }

      function showError(message) {
        ui.errorBox.style.display = "block";
        ui.errorBox.textContent = `Error: ${message}`;
      }

      function clearError() {
        ui.errorBox.style.display = "none";
        ui.errorBox.textContent = "";
      }

      function uniquePush(list, items) {
        items.forEach((item) => {
          if (!list.includes(item)) list.push(item);
        });
      }

      function applyEffects(state, effects = {}) {
        if (effects.flags) {
          Object.entries(effects.flags).forEach(([k, v]) => {
            state.flags[k] = v;
          });
        }
        if (effects.relation) {
          Object.entries(effects.relation).forEach(([k, v]) => {
            state.relation[k] = (state.relation[k] || 0) + v;
          });
        }
        if (effects.addItems) uniquePush(state.inventory, effects.addItems);
      }

      function applyOnEnter(state, node) {
        if (state.visited[state.current]) return;
        if (node.onEnter?.addItems) uniquePush(state.inventory, node.onEnter.addItems);
        if (node.onEnter?.addBook) uniquePush(state.recipeBook, node.onEnter.addBook);
        state.visited[state.current] = true;
      }

      function renderStats(state) {
        const tone = state.flags.protective ? "Protective" : "Balanced";
        const risk = state.flags.riskyPlan ? "Risky Brew" : "Careful Brew";
        const truth = state.flags.sharedTruth ? "Truth Shared" : "Truth Hidden";
        const body = state.flags.limbInjury ? "Injured" : "Whole";
        ui.stats.innerHTML = `
          <div><strong>Route Tone:</strong> ${tone}</div>
          <div><strong>Plan:</strong> ${risk}</div>
          <div><strong>Trust:</strong> ${truth}</div>
          <div><strong>Body:</strong> <span class="meter">${body}</span></div>
          <div><strong>Relations:</strong> Orchard ${state.relation.orchard}, Raincoat ${state.relation.raincoat}, Mirror ${state.relation.mirror}</div>
        `;
        ui.inventory.innerHTML = state.inventory.length
          ? `<ul>${state.inventory.map((i) => `<li>${i}</li>`).join("")}</ul>`
          : "<div class='mini'>No ingredients yet.</div>";
        ui.book.innerHTML = `<ul>${state.recipeBook.map((r) => `<li>${r}</li>`).join("")}</ul>`;
      }

      function renderScene(state) {
        clearError();
        const node = GAME_DATA[state.current];
        if (!node) {
          showError(`Scene '${state.current}' is missing. Use Reset Save to recover.`);
          ui.scenePanel.innerHTML = `<h2>Scene Load Failure</h2><p>We couldn't find this scene ID in game data.</p>`;
          return;
        }

        applyOnEnter(state, node);
        save(state);

        ui.progress.textContent = node.end
          ? "Story complete — you can restart or continue to reread."
          : `Current location: ${node.location}`;

        const choicesHtml = (node.choices || [])
          .map((choice, i) => `<button class="choice" data-choice="${i}">${choice.label}</button>`)
          .join("");

        ui.scenePanel.innerHTML = `
          <h2>${node.location}</h2>
          <div class="tags">${(node.tags || []).map((t) => `<span class="tag">${t}</span>`).join("")}</div>
          <div class="speaker">${node.speaker}</div>
          <div class="dialogue">${node.text}</div>
          <div class="choices">${choicesHtml || "<div class='mini'>The shift is over. Use Start New to replay.</div>"}</div>
        `;

        renderStats(state);

        ui.scenePanel.querySelectorAll("[data-choice]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const index = Number(btn.getAttribute("data-choice"));
            const selected = node.choices?.[index];
            if (!selected) {
              showError("Choice data is missing for this scene.");
              return;
            }
            applyEffects(state, selected.effects);
            state.started = true;
            state.current = selected.next;
            save(state);
            renderScene(state);
          });
        });
      }

      let state = load();

      ui.startBtn.addEventListener("click", () => {
        state = defaultState();
        state.started = true;
        state.current = "title";
        save(state);
        renderScene(state);
      });

      ui.continueBtn.addEventListener("click", () => {
        state = load();
        renderScene(state);
      });

      ui.resetBtn.addEventListener("click", () => {
        localStorage.removeItem(STORAGE_KEY);
        state = defaultState();
        renderScene(state);
      });

      renderScene(state);
      
      const STORAGE_KEY = "eat-the-book-vertical-slice-v3";
      const CHAR = { keeper:"Keeper", you:"You", orchard:"Orchard Child", raincoat:"Raincoat Child", mirror:"Mirror Child", villain:"Ashen Guest" };
      const RECIPES = {
        "Orchard Porridge": { need:["bruised oats","grave-honey","blighted apple milk"], summary:"Stabilizes first hunger." },
        "Tide Broth": { need:["shell salt","drowned roots","pale seaweed"], summary:"Lets a drowned world breathe." },
        "Sun Curd": { need:["new sun ember","true water"], summary:"Final dawn ritual." }
      };

      const SCENES = {
        title:{ location:"Title Screen", speaker:CHAR.keeper, tags:["Beginning"], text:"Tonight, one world can be fed. The Recipe Book opens to a page that smells like rain and ash.", choices:[{label:"Begin Shift", next:"cafe_intro", log:"You opened the book."}] },
        cafe_intro:{ location:"Quiet Café", speaker:CHAR.you, tags:["Location 1"], onEnter:{addBook:["Orchard Porridge","Tide Broth"], addItems:["bruised oats"]}, text:"Orchard Child, Raincoat Child, and Mirror Child wait by the stove. What promise leads your route?", choices:[{label:"Promise protection", next:"cafe_plan", effects:{flags:{protective:true}, relation:{raincoat:1}, addItems:["true water"]}, log:"You chose protection."},{label:"Promise balance", next:"cafe_plan", effects:{flags:{protective:false}, relation:{mirror:1}}, log:"You chose balance."}] },
        cafe_plan:{ location:"Quiet Café", speaker:CHAR.raincoat, tags:["Branch"], text:"Brew quickly for reach, or carefully for safety?", choices:[{label:"Fast risky brew", next:"orchard_gate", effects:{flags:{riskyPlan:true}, addItems:["hot kettle coal"]}, log:"You rushed the brew."},{label:"Careful brew", next:"orchard_gate", effects:{flags:{riskyPlan:false}, addItems:["stable broth base"]}, log:"You brewed carefully."}] },
        orchard_gate:{ location:"Ruined Orchard", speaker:CHAR.orchard, tags:["Location 2","Stealth"], onEnter:{addBook:["Scarecrow Stitch"]}, text:"Scarecrow patrols sweep lanterns through hedges. Prepare disguise or sprint?", choices:[{label:"Prepare disguise", next:"orchard_deep", effects:{flags:{disguiseChecked:true}, addItems:["grave-honey","blighted apple milk"]}, log:"Your disguise held."},{label:"Half-mask sprint", next:"orchard_deep", effects:{flags:{disguiseChecked:false, limbInjury:true}, addItems:["grave-honey"]}, log:"You were clipped by patrols."}] },
        orchard_deep:{ location:"Ruined Orchard", speaker:CHAR.you, tags:["Gathering"], text:"Take safe route home, or deep route for extra ingredients?", choices:[{label:"Safe route", next:"drowned_village", effects:{flags:{extraIngredients:false}, addItems:["orchard bark"]}, log:"You left with a lean basket."},{label:"Deep route", next:"drowned_village", effects:{flags:{extraIngredients:true}, addItems:["orchard bark","pale seaweed"]}, log:"You gathered extra stock."}] },
        drowned_village:{ location:"Drowned Village", speaker:CHAR.raincoat, tags:["Location 3"], text:"A dry cellar is safe. A watched cellar is rich with roots and salt.", choices:[{label:"Safe cellar", next:"glass_refuge", effects:{addItems:["shell salt"]}, log:"You avoided pursuit."},{label:"Watched cellar", next:"glass_refuge", effects:{addItems:["shell salt","drowned roots","pale seaweed"]}, log:"You grabbed the full broth set."}] },
        glass_refuge:{ location:"Glass Refuge", speaker:CHAR.mirror, tags:["Location 4","Trust"], text:"Will you tell the children what this cost you?", choices:[{label:"Share the truth", next:"kitchen_gate", effects:{flags:{sharedTruth:true}, relation:{orchard:1,mirror:1}}, log:"You chose honesty."},{label:"Hide the burden", next:"kitchen_gate", effects:{flags:{sharedTruth:false}, relation:{raincoat:1}}, log:"You chose silence."}] },
        kitchen_gate:{ location:"Kitchen of Fate", speaker:CHAR.villain, tags:["Final Gate"], onEnter:{addBook:["Sun Curd"]}, text:"\"Feed the baby-sun and keep fate, or refuse and crack the machine.\"", choices:[{label:"Cook Orchard Porridge", next:"resolve_orchard", log:"You prepared Orchard Porridge."},{label:"Cook Tide Broth", next:"resolve_tide", log:"You prepared Tide Broth."},{label:"Refuse the ritual", next:"ending_refuse", effects:{flags:{choseFeed:false}}, log:"You defied the ritual."}] },
        resolve_orchard:{ location:"Kitchen of Fate", speaker:CHAR.keeper, tags:["Recipe Check"], text:"Checking Orchard Porridge ingredients...", resolver:"orchard" },
        resolve_tide:{ location:"Kitchen of Fate", speaker:CHAR.keeper, tags:["Recipe Check"], text:"Checking Tide Broth ingredients...", resolver:"tide" },
        ending_restore:{ location:"Quiet Café — Dawn", speaker:CHAR.keeper, tags:["Ending"], end:true, text:"You fed the baby-sun. The drowned bells ring over dry stone, and the orchard warms." },
        ending_partial:{ location:"Quiet Café — Gray Dawn", speaker:CHAR.keeper, tags:["Ending"], end:true, text:"You fed a thinner meal. The world survives, but scars remain and routes narrow." },
        ending_refuse:{ location:"Quiet Café — Dusk", speaker:CHAR.villain, tags:["Ending"], end:true, text:"You refused. No world heals tonight, but fate's machine cracks." }
      };

      const ui = {
        progress: document.getElementById("progress"), story: document.getElementById("storyPanel"), status: document.getElementById("statusPanel"),
        book: document.getElementById("bookPanel"), inv: document.getElementById("inventoryPanel"), journal: document.getElementById("journalPanel"), error: document.getElementById("errorBox"),
        start: document.getElementById("startBtn"), cont: document.getElementById("continueBtn"), reset: document.getElementById("resetBtn"),
        tabStory: document.getElementById("tabStory"), tabBook: document.getElementById("tabBook"), tabInventory: document.getElementById("tabInventory"), tabJournal: document.getElementById("tabJournal")
      };

      function defaultState(){ return { current:"title", activeTab:"story", started:false, flags:{protective:false,riskyPlan:false,sharedTruth:false,disguiseChecked:false,extraIngredients:false,limbInjury:false,choseFeed:false}, relation:{orchard:0,raincoat:0,mirror:0}, inventory:[], recipeBook:["Orchard Porridge"], journal:["Shift initialized."], visited:{} }; }
      function uniqPush(arr, items){ items.forEach(i=>{ if(!arr.includes(i)) arr.push(i); }); }
      function addLog(state, line){ if(line){ state.journal.push(line); if(state.journal.length>50) state.journal.shift(); } }
      function persist(state){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      function showError(msg){ ui.error.style.display="block"; ui.error.textContent=`Error: ${msg}`; }
      function clearError(){ ui.error.style.display="none"; ui.error.textContent=""; }
      function loadState(){ try{ const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return defaultState(); const p=JSON.parse(raw); return {...defaultState(), ...p, flags:{...defaultState().flags,...(p.flags||{})}, relation:{...defaultState().relation,...(p.relation||{})}, inventory:Array.isArray(p.inventory)?p.inventory:[], recipeBook:Array.isArray(p.recipeBook)?p.recipeBook:defaultState().recipeBook, journal:Array.isArray(p.journal)?p.journal:defaultState().journal, visited:(p.visited&&typeof p.visited==="object")?p.visited:{}}; }catch(e){ showError("Save data failed to load. New save created."); return defaultState(); } }
      function hasAll(state, need){ return need.every(x=>state.inventory.includes(x)); }
      function applyOnEnter(state, scene){ if(state.visited[state.current]) return; if(scene.onEnter?.addItems) uniqPush(state.inventory, scene.onEnter.addItems); if(scene.onEnter?.addBook) uniqPush(state.recipeBook, scene.onEnter.addBook); state.visited[state.current]=true; }
      function applyEffects(state, eff={}){ if(eff.flags) Object.entries(eff.flags).forEach(([k,v])=>state.flags[k]=v); if(eff.relation) Object.entries(eff.relation).forEach(([k,v])=>state.relation[k]=(state.relation[k]||0)+v); if(eff.addItems) uniqPush(state.inventory, eff.addItems); if(eff.addBook) uniqPush(state.recipeBook, eff.addBook); }

      function resolveScene(state, resolver){ if(resolver==="orchard"){ state.flags.choseFeed=true; addLog(state,"Attempted Orchard Porridge."); state.current=hasAll(state, RECIPES["Orchard Porridge"].need)?"ending_restore":"ending_partial"; return true; } if(resolver==="tide"){ state.flags.choseFeed=true; addLog(state,"Attempted Tide Broth."); state.current=hasAll(state, RECIPES["Tide Broth"].need)?"ending_restore":"ending_partial"; return true; } showError(`Unknown resolver '${resolver}'.`); return false; }

      function renderPanels(state){
        const tone=state.flags.protective?"Protective":"Balanced"; const plan=state.flags.riskyPlan?"Risky":"Careful"; const truth=state.flags.sharedTruth?"Honest":"Guarded"; const body=state.flags.limbInjury?"Injured":"Whole";
        ui.status.innerHTML=`<h3>Route Status</h3><p><strong>Tone:</strong> ${tone}</p><p><strong>Plan:</strong> ${plan}</p><p><strong>Trust:</strong> ${truth}</p><p><strong>Body:</strong> ${body}</p><p><strong>Relations:</strong> Orchard ${state.relation.orchard}, Raincoat ${state.relation.raincoat}, Mirror ${state.relation.mirror}</p>`;
        ui.book.innerHTML=`<h3>Recipe Book</h3><ul>${state.recipeBook.map(name=>{const r=RECIPES[name]; return r?`<li><strong>${name}</strong><br><span class='muted'>Needs: ${r.need.join(", ")} · ${r.summary}</span></li>`:`<li>${name}</li>`;}).join("")}</ul>`;
        ui.inv.innerHTML=state.inventory.length?`<h3>Inventory</h3><ul>${state.inventory.map(i=>`<li>${i}</li>`).join("")}</ul>`:"<h3>Inventory</h3><p class='muted'>No items gathered yet.</p>";
        ui.journal.innerHTML=`<h3>Journal</h3><ul>${state.journal.map(l=>`<li>${l}</li>`).join("")}</ul>`;
      }

      function setTab(state, tab){ state.activeTab=tab; ui.story.classList.toggle("hidden",tab!=="story"); ui.book.classList.toggle("hidden",tab!=="book"); ui.inv.classList.toggle("hidden",tab!=="inventory"); ui.journal.classList.toggle("hidden",tab!=="journal"); persist(state); }

      function render(state){ clearError(); const scene=SCENES[state.current]; if(!scene){ showError(`Scene '${state.current}' is missing. Press Reset Save.`); ui.story.innerHTML="<h2>Scene Load Failure</h2><p>Game data for this scene was not found.</p>"; return; }
        applyOnEnter(state, scene);
        if(scene.resolver){ if(resolveScene(state, scene.resolver)){ persist(state); render(state); } return; }
        ui.progress.textContent=scene.end?"Ending reached. Continue to review or Start New.":`Current: ${scene.location}`;
        const choices=(scene.choices||[]).map((c,i)=>`<button class='choice' data-i='${i}'>${c.label}</button>`).join("");
        ui.story.innerHTML=`<h2 class='loc'>${scene.location}</h2><div class='chips'>${(scene.tags||[]).map(t=>`<span class='chip'>${t}</span>`).join("")}</div><div class='speaker'>${scene.speaker}</div><p class='text'>${scene.text}</p><div class='choices'>${choices||"<p class='muted'>No more choices. Start New to replay.</p>"}</div>`;
        ui.story.querySelectorAll("[data-i]").forEach(btn=>btn.addEventListener("click",()=>{ const choice=scene.choices?.[Number(btn.dataset.i)]; if(!choice||!choice.next){ showError("Choice data is malformed."); return; } applyEffects(state, choice.effects); addLog(state, choice.log); state.started=true; state.current=choice.next; persist(state); render(state); }));
        renderPanels(state); setTab(state, state.activeTab||"story");
      }

      let state=loadState();
      ui.start.addEventListener("click",()=>{ state=defaultState(); state.started=true; addLog(state,"New shift started."); persist(state); render(state); });
      ui.cont.addEventListener("click",()=>{ state=loadState(); render(state); });
      ui.reset.addEventListener("click",()=>{ localStorage.removeItem(STORAGE_KEY); state=defaultState(); addLog(state,"Save reset."); render(state); });
      ui.tabStory.addEventListener("click",()=>setTab(state,"story")); ui.tabBook.addEventListener("click",()=>setTab(state,"book")); ui.tabInventory.addEventListener("click",()=>setTab(state,"inventory")); ui.tabJournal.addEventListener("click",()=>setTab(state,"journal"));
      render(state);
    </script>
  </body>
</html>
